<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>student profile</title>
</head>
<body>
    <h1>Heloo {{ name }}</h1>
    {% if is_Topper %}
        <p>Congratulations, {{ name }}! You are the top student in your class.</p>
    {% else %}
        <p>Keep up the good work, {{ name }}! You are doing great.</p>
    {% endif %}

    <h3>Subjects:</h3>
    <ul>
        {% for subject in subjects %}
            <li>{{ subject }}</li>
        {% endfor %}
    </ul>
</body>
</html>
